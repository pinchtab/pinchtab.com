  <path d="M742 390H834" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
  <path d="M452 390L434 378V402L452 390Z" fill="#FACC15"/>
  <path d="M814 390L796 378V402L814 390Z" fill="#60A5FA"/>

