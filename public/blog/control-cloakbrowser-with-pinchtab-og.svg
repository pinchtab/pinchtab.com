  <text x="78" y="224" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="54" font-weight="700">with PinchTab</text>
  <text x="78" y="268" fill="#94A3B8" font-family="Arial, sans-serif" font-size="24">Run PinchTab in cloak mode and use CloakBrowser as the browser runtime.</text>

